services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    environment:
      POSTGRES_USER: bbb
      POSTGRES_PASSWORD: bbb
      POSTGRES_DB: bbb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbb"]
      interval: 5s
      timeout: 5s
      retries: 10

  tailscale:
    image: docker.io/tailscale/tailscale:latest
    container_name: tailscale-transit
    hostname: transit
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./serve-config.json:/config/serve-config.json:ro,z
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module

  app:
    build: .
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      db:
        condition: service_healthy
      tailscale:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgres://bbb:bbb@localhost:5432/bbb

volumes:
  pgdata:
  tailscale-state:
